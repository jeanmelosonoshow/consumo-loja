<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Administração de relógios e leituras de consumo." />
    <title>Admin consumo das lojas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <section id="login-screen" class="login-screen">
      <form id="login-form" class="login-card">
        <span class="brand-mark">CL</span>
        <p class="eyebrow">Administração</p>
        <h1>Acesso restrito</h1>
        <p>Entre com seu usuário do FDC Web. O acesso será liberado somente para funcionários autorizados.</p>
        <label>
          Usuário
          <input name="usuario" type="text" autocomplete="username" required />
        </label>
        <label>
          Senha
          <input name="senha" type="password" autocomplete="current-password" required />
        </label>
        <p id="login-error" class="message message--error" hidden></p>
        <button class="button button--primary" type="submit">Entrar no admin</button>
      </form>
    </section>

    <script src="admin.js"></script>
  </body>
</html>
